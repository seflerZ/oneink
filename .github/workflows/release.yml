name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Find MSBuild
        id: msbuild
        shell: pwsh
        run: |
          $vswhere = "${env:ProgramFiles(x86)}\Microsoft Visual Studio\Installer\vswhere.exe"
          $msbuild = & $vswhere -latest -products * -requires Microsoft.Component.MSBuild -find MSBuild\**\Bin\MSBuild.exe | Select-Object -First 1
          if (-not $msbuild) { throw "MSBuild not found" }
          echo "MSBuild path: $msbuild"
          echo "msbuild_path=$msbuild" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8

      - name: Build
        shell: pwsh
        run: |
          & "${{ steps.msbuild.outputs.msbuild_path }}" OneInk.sln /p:Configuration=Release /p:Platform=x64 /t:Rebuild /v:m

      - name: Prepare Release Package
        shell: pwsh
        run: |
          $src = "OneInk\bin\x64\Release"
          $ver = $env:GITHUB_REF_NAME -replace '^v', ''
          $dst = "$env:TEMP\OneInk-$ver-win64"
          if (Test-Path $dst) { Remove-Item $dst -Recurse -Force }
          New-Item -ItemType Directory -Path $dst -Force | Out-Null
          Copy-Item -Path "$src\*" -Destination $dst -Recurse -Force
          Copy-Item -Path "OneInk\Resources\*" -Destination $dst -Recurse -Force
          Copy-Item -Path "install.ps1" -Destination $dst -Force
          Copy-Item -Path "uninstall.ps1" -Destination $dst -Force
          Copy-Item -Path "config.ps1" -Destination $dst -Force
          Compress-Archive -Path "$dst\*" -DestinationPath "OneInk-$ver-win64.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: OneInk-*-win64.zip
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
